server:
  port: 6001

management:
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus,zipkin"
  observations:
    annotations:
      enabled: true
  tracing:
    sampling:
      probability: 1.0
    brave:
      span-handler:
        enabled: true
  zipkin:
    tracing:
      endpoint: "http://localhost:9411/api/v2/spans"

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"

spring:
  application:
    name: order-service
  data:
    redis:
      host: localhost
      port: 6379
  cloud:
    function:
      definition: orderFinalizer # buraya orderSource yazmadık çünkü orderSource sadece event yayınlayacak, herhangi bir event dinlemeyecek
    stream:
      bindings:
        orderSource-out-0:
          destination: order-events
        orderFinalizer-in-0:
          destination: order-status-updates
          group: order-service-group
          consumer:
            maxAttempts: 4
            backOffInitialInterval: 1000
            backOffMaxInterval: 10000
            backOffMultiplier: 2.0
      kafka:
        binder:
          brokers: localhost:9092
        bindings:
          orderFinalizer-in-0:
            consumer:
              startOffset: earliest
              enableDlq: true
              dlqName: order-status-updates.dlq

  datasource:
    url: jdbc:postgresql://localhost:5432/order_db
    username: user
    password: password
  jpa:
    hibernate:
      ddl-auto: update

app:
  redis-lock:
    key-prefix: order-service
    wait-timeout: 2s
    lease-time: 10s
    retry-interval: 50ms