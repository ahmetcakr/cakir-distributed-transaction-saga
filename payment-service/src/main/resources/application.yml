server:
  port: 6002

management:
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus,zipkin"
  observations:
    annotations:
      enabled: true
  tracing:
    sampling:
      probability: 1.0
    brave:
      span-handler:
        enabled: true
  zipkin:
    tracing:
      endpoint: "http://localhost:9411/api/v2/spans"

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"

spring:
  application:
    name: payment-service
  data:
    redis:
      host: localhost
      port: 6379

  datasource:
    url: jdbc:postgresql://localhost:5432/payment_db
    username: user
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  cloud:
    function:
      definition: paymentProcessor
    stream:
      bindings:
        paymentProcessor-in-0:
          destination: payment-commands
          group: payment-service-group
          consumer:
            maxAttempts: 4
            backOffInitialInterval: 1000
            backOffMaxInterval: 10000
            backOffMultiplier: 2.0
        paymentResponse-out-0:
          destination: payment-events
      kafka:
        binder:
          brokers: localhost:9092
        bindings:
          paymentProcessor-in-0:
            consumer:
              enableDlq: true
              dlqName: payment-commands.dlq

app:
  redis-lock:
    key-prefix: payment-service
    wait-timeout: 2s
    lease-time: 10s
    retry-interval: 50ms